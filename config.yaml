# ─── AI Video Pipeline Config ────────────────────────────────────────────────
# Edit directly or run: python setup.py

# ── Script generation ─────────────────────────────────────────────────────────

brief: brief.md          # path to your brief file
duration: 2              # target video length in minutes

# ── Video model ───────────────────────────────────────────────────────────────
# standard  fal-ai/kling-video/v3/standard   $0.084/sec (~$0.84/10s clip)  best value
# pro       fal-ai/kling-video/v3/pro        $0.112/sec (~$1.12/10s clip)  higher quality
# budget    fal-ai/kling-video/v2.1/standard $0.056/sec (~$0.56/10s clip)  older model
# wan       fal-ai/wan/v2.2                  $0.080/sec (~$0.80/10s clip)  open source alt

model: standard

# ── Clip settings ─────────────────────────────────────────────────────────────

clip_duration: 10        # seconds per clip: 5 or 10 (budget model uses 5)
aspect_ratio: "16:9"     # 16:9 (landscape) | 9:16 (vertical/Shorts) | 1:1 (square)

# ── Voiceover ─────────────────────────────────────────────────────────────────
# Find voice IDs at https://elevenlabs.io/voice-library
# Leave blank to use the ELEVENLABS_KEY from .env with default voice

voice_id: "rPMkKgdwgIwqv4fXgR6N"   # Custom voice
